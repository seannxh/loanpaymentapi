spring.application.name=payment-api

# File-based H2 so users and loans survive restarts.
# The DB file is written to ./data/loanpaymentdb relative to the working directory.
spring.datasource.url=jdbc:h2:file:./data/loanpaymentdb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# JWT auth. Override app.jwt.secret in production (must be >= 32 bytes for HS256).
app.jwt.secret=dev-secret-change-me-please-this-needs-to-be-at-least-32-bytes-long
app.jwt.expiration-ms=86400000

# Base URL of the React app, used to build password-reset links in emails.
app.frontend-url=http://localhost:5173

# ---- Email reminders ----
# Remind users about installments due within this many days, on this schedule.
app.mail.reminder-days=3
app.mail.reminder-cron=0 0 9 * * *
app.mail.from=no-reply@loanpay.local

# SMTP is OFF by default (no host) so the app runs without credentials and just
# skips sending. To enable real reminder emails (e.g. Gmail), uncomment and fill
# these in — for Gmail use an App Password, not your normal password.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=nohsean6@gmail.com
spring.mail.password=your-16-char-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
